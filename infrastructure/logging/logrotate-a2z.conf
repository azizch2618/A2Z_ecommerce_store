# Log rotation for Docker json-file logs on origin host
# Install: sudo cp infrastructure/logging/logrotate-a2z.conf /etc/logrotate.d/a2z-tools

/var/lib/docker/containers/*/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    maxsize 100M
}

/var/log/a2z-backup.log
/var/log/a2z-deploy.log {
    weekly
    rotate 8
    compress
    missingok
    notifempty
}
