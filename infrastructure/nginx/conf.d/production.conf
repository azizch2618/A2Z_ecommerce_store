# Production virtual hosts — www, dashboard, api
#
# Requires TLS certs at /etc/nginx/ssl/a2ztools.com/
# Upstreams and rate-limit zones are defined in nginx.prod.conf

# Redirect apex to www
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name a2ztools.com;

    ssl_certificate     /etc/nginx/ssl/a2ztools.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/a2ztools.com/privkey.pem;

    return 301 https://www.a2ztools.com$request_uri;
}

# ---------------------------------------------------------------------------
# Storefront — www.a2ztools.com
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name www.a2ztools.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.a2ztools.com;

    ssl_certificate     /etc/nginx/ssl/a2ztools.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/a2ztools.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 20M;

    location /_next/static/ {
        proxy_pass http://web_frontend;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://web_frontend;
        include /etc/nginx/proxy_params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---------------------------------------------------------------------------
# Admin Dashboard — dashboard.a2ztools.com
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name dashboard.a2ztools.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name dashboard.a2ztools.com;

    ssl_certificate     /etc/nginx/ssl/a2ztools.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/a2ztools.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Optional: restrict admin to office/VPN IPs
    # satisfy any;
    # allow 203.0.113.0/24;
    # deny all;

    location / {
        proxy_pass http://web_frontend;
        include /etc/nginx/proxy_params.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---------------------------------------------------------------------------
# API — api.a2ztools.com
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name api.a2ztools.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name api.a2ztools.com;

    ssl_certificate     /etc/nginx/ssl/a2ztools.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/a2ztools.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    location /api/v1/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/ {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params.conf;
    }

    location /admin/ {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params.conf;
    }

    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
    }
}
