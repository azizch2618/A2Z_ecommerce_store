# A2Z Tools — Production Nginx main config
#
# Used by docker-compose.prod.yml (--profile proxy).
# Virtual hosts: conf.d/production.conf
# TLS material: ssl/a2ztools.com/{fullchain.pem,privkey.pem}

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 25M;

    # Auth endpoint rate limit (must be in http context)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_status 429;

    upstream api_backend {
        server backend:8000;
        keepalive 32;
    }

    upstream web_frontend {
        server frontend:3000;
        keepalive 16;
    }

    # Internal healthcheck for Docker (no TLS)
    server {
        listen 8080;
        server_name localhost;

        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }

    include /etc/nginx/conf.d/*.conf;
}
