# A2Z Tools — Production overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Required: set strong secrets in .env (DJANGO_SECRET_KEY, POSTGRES_PASSWORD, etc.)

services:
  postgres:
    restart: always
    ports: []  # internal network only

  redis:
    restart: always
    ports: []  # internal network only

  pgadmin:
    restart: always
    profiles: [ops]  # enable with: --profile ops

  backend:
    image: ${BACKEND_IMAGE:-}
    build:
      target: production
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "False"
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-False}
      COLLECT_STATIC: "false"
      WAIT_FOR_POSTGRES: "true"
      RUN_MIGRATIONS: "true"
    volumes:
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    ports: []  # reached via nginx only

  frontend:
    image: ${FRONTEND_IMAGE:-}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_ADMIN_URL: ${NEXT_PUBLIC_ADMIN_URL:-https://dashboard.a2ztools.com}
    restart: always
    environment:
      NODE_ENV: production
    volumes: []
    ports: []  # reached via nginx only

  celery:
    profiles: [workers]
    build:
      target: production
    restart: always
    volumes:
      - backend_media:/app/media
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "False"
      RUN_MIGRATIONS: "false"

  celery-beat:
    profiles: [workers]
    build:
      target: production
    restart: always
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "False"
      RUN_MIGRATIONS: "false"

  nginx:
    profiles: [proxy]
    image: nginx:1.27-alpine
    container_name: a2z-nginx
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - backend_static:/var/www/static:ro
      - backend_media:/var/www/media:ro
    networks:
      - a2z-network
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
